version: '3.8'

services:
  api:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env

  frontend:
    image: python:3.11-slim
    working_dir: /app/apps/frontend
    volumes:
      - ./apps/frontend:/app/apps/frontend
    ports:
      - "3000:3000"
    command: python -m http.server 3000
